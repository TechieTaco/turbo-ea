name: turboea

services:
  db:
    image: ghcr.io/vincentmakes/turbo-ea/db:${TURBO_EA_TAG}
    restart: unless-stopped
    user: "1000:1000"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/vincentmakes/turbo-ea/backend:${TURBO_EA_TAG}
    restart: unless-stopped
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      ENVIRONMENT: ${ENVIRONMENT}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      RESET_DB: ${RESET_DB}
      SEED_DEMO: ${SEED_DEMO}
      SEED_BPM: ${SEED_BPM}
      SEED_PPM: ${SEED_PPM}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_TLS: ${SMTP_TLS}
      AI_PROVIDER_URL: ${AI_PROVIDER_URL}
      AI_MODEL: ${AI_MODEL}
      AI_SEARCH_PROVIDER: ${AI_SEARCH_PROVIDER}
      AI_SEARCH_URL: ${AI_SEARCH_URL}
      AI_AUTO_CONFIGURE: ${AI_AUTO_CONFIGURE}
      NVD_API_KEY: ${NVD_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    expose:
      - "8000"

  frontend:
    image: ghcr.io/vincentmakes/turbo-ea/frontend:${TURBO_EA_TAG}
    restart: unless-stopped
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    expose:
      - "8080"

  mcp-server:
    image: ghcr.io/vincentmakes/turbo-ea/mcp-server:${TURBO_EA_TAG}
    profiles:
      - mcp
    restart: unless-stopped
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      TURBO_EA_URL: ${TURBO_EA_URL}
      TURBO_EA_PUBLIC_URL: ${TURBO_EA_PUBLIC_URL}
      MCP_PORT: ${MCP_PORT}
      MCP_PUBLIC_URL: ${MCP_PUBLIC_URL}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    expose:
      - "8001"

  nginx:
    image: ghcr.io/vincentmakes/turbo-ea/nginx:${TURBO_EA_TAG}
    restart: unless-stopped
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      - backend
      - frontend
    ports:
      - "${HOST_PORT}:8080"

  ollama:
    image: ghcr.io/vincentmakes/turbo-ea/ollama:${TURBO_EA_TAG}
    profiles:
      - ai
    restart: unless-stopped
    user: "1000:1000"
    volumes:
      - ollama_models:/models
    expose:
      - "11434"
    deploy:
      resources:
        limits:
          memory: ${OLLAMA_MEMORY_LIMIT}
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
  ollama_models:
