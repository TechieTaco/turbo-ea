repos:
  # ── General checks ──────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: no-commit-to-branch
        args: [--branch, main]

  # ── Backend: Python linting & formatting ──────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # ── Frontend: ESLint & TypeScript ─────────────────────────────────────
  - repo: local
    hooks:
      - id: frontend-lint
        name: Frontend ESLint
        entry: bash -c 'cd frontend && npx eslint --max-warnings=0 "$@"' --
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        types: [file]

      - id: frontend-typecheck
        name: Frontend TypeScript
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false

  # ── OpenAPI spec: regenerate when VERSION changes ─────────────────────
  # The committed spec at docs/api/openapi.json embeds info.version, so a
  # VERSION bump alone causes spec drift and fails the PR's openapi-spec
  # CI check. This hook runs scripts/dump_openapi.py whenever VERSION is
  # staged; pre-commit then notices the regenerated openapi.json and asks
  # you to re-stage it. Backend route or schema changes that produce drift
  # still need `python scripts/dump_openapi.py` run manually, or land via
  # main where the openapi-spec job auto-commits the refresh.
  - repo: local
    hooks:
      - id: openapi-regenerate-on-version
        name: Regenerate docs/api/openapi.json on VERSION bump
        entry: python scripts/dump_openapi.py docs/api/openapi.json
        language: system
        files: ^VERSION$
        pass_filenames: false
