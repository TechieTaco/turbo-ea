repos:
  # ── General checks ──────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: no-commit-to-branch
        args: [--branch, main]

  # ── Backend: Python linting & formatting ──────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # ── Frontend: ESLint & TypeScript ─────────────────────────────────────
  - repo: local
    hooks:
      - id: frontend-lint
        name: Frontend ESLint
        entry: bash -c 'cd frontend && npx eslint --max-warnings=0 "$@"' --
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        types: [file]

      - id: frontend-typecheck
        name: Frontend TypeScript
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false

  # NOTE: There is no pre-commit hook for docs/api/openapi.json. The dump
  # script normalises info.version to "latest", so VERSION bumps no longer
  # cause spec drift. Backend route or schema changes that produce drift
  # still need `python scripts/dump_openapi.py` run manually, or land via
  # main where the openapi-spec CI job auto-commits the refresh.
