name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Change Detection ─────────────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      mcp: ${{ steps.filter.outputs.mcp }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'VERSION'
              - 'scripts/dump_openapi.py'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            mcp:
              - 'mcp-server/**'
              - '.github/workflows/ci.yml'
            docs:
              - 'docs/**'
              - 'mkdocs.yml'
              - 'requirements-docs.txt'

  # ── Backend ───────────────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff>=0.8.0
      - run: ruff check backend/
      - run: ruff format --check backend/

  backend-test:
    name: Backend Tests
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: turboea
          POSTGRES_PASSWORD: turboea
          POSTGRES_DB: turboea_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U turboea -d turboea_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: pip install -e ".[dev]"
        working-directory: backend
      - name: Run tests with coverage
        run: python -m pytest --cov=app --cov-report=term-missing --cov-fail-under=40 -q
        working-directory: backend
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_USER: turboea
          POSTGRES_PASSWORD: turboea
          TEST_POSTGRES_DB: turboea_test

  backend-typecheck:
    name: Backend Type Check
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    # Informational only — does not block PRs until type errors are resolved
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: pip install -e ".[dev]"
        working-directory: backend
      - name: Run mypy
        run: python -m mypy app/
        working-directory: backend

  # ── Security Scanning ────────────────────────────────────────────────
  security-backend:
    name: Backend Security Scan
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    # Informational only — does not block PRs until findings are triaged
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install pip-audit and pip-tools
        run: pip install pip-audit pip-tools
      - name: Generate requirements and audit
        run: |
          pip-compile --quiet --strip-extras -o /tmp/requirements.txt backend/pyproject.toml
          pip-audit --strict --desc -r /tmp/requirements.txt

  security-frontend:
    name: Frontend Security Scan
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    # Informational only — does not block PRs until findings are triaged
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - name: Audit npm dependencies
        run: npm audit --omit=dev
        working-directory: frontend

  # ── Migration Rollback Test ───────────────────────────────────────────
  migration-rollback:
    name: Migration Rollback Test
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: turboea
          POSTGRES_PASSWORD: turboea
          POSTGRES_DB: turboea_migration_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U turboea -d turboea_migration_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: pip install -e ".[dev]"
        working-directory: backend
      - name: Create tables and stamp head (mirrors app startup on fresh DB)
        run: |
          python -c "
          from app.models import Base
          from app.database import engine
          import asyncio

          async def init():
              async with engine.begin() as conn:
                  await conn.run_sync(Base.metadata.create_all)

          asyncio.run(init())
          "
          alembic stamp head
        working-directory: backend
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5433"
          POSTGRES_USER: turboea
          POSTGRES_PASSWORD: turboea
          POSTGRES_DB: turboea_migration_test
      - name: Test downgrade and re-upgrade of latest migration
        run: |
          alembic downgrade -1
          alembic upgrade head
        working-directory: backend
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5433"
          POSTGRES_USER: turboea
          POSTGRES_PASSWORD: turboea
          POSTGRES_DB: turboea_migration_test

  # ── Frontend ──────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend

  frontend-build:
    name: Frontend Build
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  frontend-test:
    name: Frontend Tests
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx vitest run --coverage.enabled --coverage.reporter=text
        working-directory: frontend

  # ── MCP Server ───────────────────────────────────────────────────────
  mcp-test:
    name: MCP Server Tests
    needs: changes
    if: needs.changes.outputs.mcp == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: mcp-server/pyproject.toml
      - run: pip install -e ".[dev]"
        working-directory: mcp-server
      - run: python -m pytest -q
        working-directory: mcp-server

  # ── OpenAPI Spec (auto-regenerated for the docs site) ────────────────
  # On PRs:  fails if docs/api/openapi.json has drifted from the backend.
  # On main: regenerates and commits the spec back to main when stale, so
  #          contributors can land backend changes without running the
  #          dump script locally.
  openapi-spec:
    name: OpenAPI Spec
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          # Need full history + push permission for the auto-commit step on main.
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend (no dev deps)
        run: pip install -e .
        working-directory: backend
      - name: Regenerate OpenAPI spec
        run: python scripts/dump_openapi.py docs/api/openapi.json
      - name: Check for drift
        id: diff
        run: |
          if git diff --quiet -- docs/api/openapi.json; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "OpenAPI spec is up to date."
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "::group::Spec drift"
            git --no-pager diff -- docs/api/openapi.json | head -200
            echo "::endgroup::"
          fi
      - name: Fail PR if spec is stale
        if: github.event_name == 'pull_request' && steps.diff.outputs.drift == 'true'
        run: |
          echo "::error::docs/api/openapi.json is out of sync with the backend."
          echo "Run 'python scripts/dump_openapi.py' locally and commit the result."
          exit 1
      - name: Commit refreshed spec on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.diff.outputs.drift == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/api/openapi.json
          git commit -m "chore(docs): regenerate OpenAPI spec [skip ci]"
          git push origin HEAD:main

  # ── Documentation ────────────────────────────────────────────────────
  docs-build:
    name: Docs Build
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements-docs.txt
      - run: mkdocs build
