name: Publish Docker images to GHCR

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  # Required for cosign keyless signing via the GitHub OIDC token.
  id-token: write
  # Required for the SARIF upload step (Trivy → Security tab).
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The `ollama` target is intentionally excluded — it adds only a thin
        # non-root patch on top of `ollama/ollama:latest` (mkdir + chown +
        # USER), so rebuilding multi-arch on every main push is wasteful.
        # Republish manually when upstream changes meaningfully:
        #   docker buildx build --platform linux/amd64,linux/arm64 \
        #     --target ollama \
        #     -t ghcr.io/vincentmakes/turbo-ea/ollama:latest \
        #     -t ghcr.io/vincentmakes/turbo-ea/ollama:0.70.0 \
        #     --push .
        image: [db, backend, frontend, nginx, mcp-server]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          flavor: latest=auto
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.image }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: true
          sbom: true

      # Sign the manifest list digest. Buildx returns a single digest covering
      # both linux/amd64 and linux/arm64, so one cosign call covers all
      # platforms transparently. Keyless OIDC signing — no cosign key to
      # rotate; verification uses the workflow identity certificate.
      - name: Install cosign
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3

      - name: Sign image
        env:
          IMAGE: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      # Trivy gate is enforcing (`exit-code: 1`). Each runtime stage in the
      # Dockerfile runs `apk upgrade --no-cache` so apk-package CVEs in the
      # pinned alpine bases are picked up automatically; everything else
      # (build-stage-only findings, upstream binaries we can't rebuild) is
      # captured with rationale in `.github/trivy-allowlist.yaml`. New
      # HIGH/CRITICAL findings outside the allowlist will fail the publish
      # — triage and either fix in the Dockerfile or add an allowlist entry.
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: .github/trivy-allowlist.yaml

      - name: Upload Trivy SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@53e96ec3b35fce51c141c0d6f0e31028a448722d # v3
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}
