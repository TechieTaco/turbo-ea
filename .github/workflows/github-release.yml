name: Publish GitHub Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Build release notes from changelog
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          # Contract: CHANGELOG headings must stay in Keep a Changelog form,
          # e.g. `## [0.70.0] - 2026-05-05`, so the matching section can be cut.
          section=$(awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { capture=1; next }
            capture && $0 ~ "^## \\[" { exit }
            capture { print }
          ' CHANGELOG.md)

          if [[ -z "$section" ]]; then
            echo "Could not find changelog section for version $version" >&2
            exit 1
          fi

          # Detect prereleases (e.g. v1.0.0-rc.1, v1.0.0-beta.2). The
          # publish workflow already excludes these from `:latest` via
          # `flavor: latest=auto`; mark the GitHub Release prerelease too
          # so the Releases page distinguishes them.
          if [[ "$version" == *-* ]]; then
            prerelease=true
          else
            prerelease=false
          fi

          delimiter="CHANGELOG_$(openssl rand -hex 8)"
          {
            echo "name=Turbo EA $version"
            echo "prerelease=${prerelease}"
            echo "body<<${delimiter}"
            printf '%s\n' "$section"
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          name: ${{ steps.notes.outputs.name }}
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: ${{ steps.notes.outputs.prerelease }}
          generate_release_notes: false
